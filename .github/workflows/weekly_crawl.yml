name: Weekly PDL Crawl

on:
  schedule:
    - cron: '0 1 * * 2'   # 매주 화요일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:        # 수동 실행도 유지

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # git push 권한

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawl pipeline
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/crawler
          python crawler/pipeline.py

      - name: Commit updated data
        run: |
          git config user.name 'pdl-bot'
          git config user.email 'pdl-bot@github.com'
          git add data/
          git diff --staged --quiet || git commit -m "data: weekly update $(date +'%Y-%m-%d')"
          git push
