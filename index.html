<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Medicaid PDL Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson@3"></script>
</head>
<body class="bg-gray-50">
  <div class="container mx-auto px-4 py-8 max-w-7xl">

    <header class="mb-6 border-b pb-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-900">Medicaid PDL Status Tracker</h1>
      <div id="last-update" class="text-sm text-gray-400">Last Updated: Loading...</div>
    </header>

    <!-- 요약 카드 -->
    <div id="summary-cards" class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-gray-100 rounded-xl p-4 text-center animate-pulse h-20"></div>
      <div class="bg-gray-100 rounded-xl p-4 text-center animate-pulse h-20"></div>
      <div class="bg-gray-100 rounded-xl p-4 text-center animate-pulse h-20"></div>
    </div>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 지도 -->
      <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-semibold mb-4">Market Access Map — Adalimumab (Hadlima)</h2>
        <div id="map-container" class="relative w-full h-[480px] bg-blue-50 rounded-lg overflow-hidden"></div>
        <div class="mt-4 flex justify-center gap-6 text-sm">
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 rounded" style="background:#2D5A27"></span> Preferred
          </div>
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 rounded" style="background:#C8102E"></span> Non-Preferred
          </div>
          <div class="flex items-center gap-2">
            <span class="w-4 h-4 bg-gray-300 rounded"></span> Pending / No Data
          </div>
        </div>
      </div>

      <!-- 리스트 -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-semibold mb-4">State List</h2>
        <div id="state-list" class="h-[480px] overflow-y-auto space-y-1">
          <p class="text-gray-400 text-center py-10">Loading...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
