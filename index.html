<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Medicaid PDL Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <div id="app" class="container mx-auto px-4 py-8">
        <header class="mb-8 border-b pb-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-blue-900">Medicaid PDL Status Tracker</h1>
            <div id="last-update" class="text-sm text-gray-500">Last Updated: Loading...</div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4">Market Access Map: Adalimumab (Hadlima)</h2>
                <div id="map-container" class="relative w-full h-[500px] bg-blue-50 rounded-lg overflow-hidden">
                    </div>
                <div class="mt-4 flex justify-center gap-6">
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#2D5A27] rounded"></span> Preferred</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-[#C8102E] rounded"></span> Non-Preferred</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 bg-gray-300 rounded"></span> No Data / Pending</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4">State List View</h2>
                <div id="state-list" class="h-[500px] overflow-y-auto space-y-2">
                    <p class="text-gray-400 text-center py-10">Loading data...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
